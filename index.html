<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homework Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.4rem;
      color: #ffffff;
      margin-bottom: 12px;
      letter-spacing: 1px;
      text-align: center;
    }

    .subtitle {
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 60px;
      text-align: center;
    }

    .students-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      justify-content: center;
      max-width: 900px;
    }

    .student-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 180px;
      height: 200px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      text-decoration: none;
      color: white;
      gap: 14px;
      transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    .student-card:hover {
      transform: translateY(-6px);
      background: rgba(255,255,255,0.14);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }

    .student-card .emoji {
      font-size: 3rem;
      line-height: 1;
    }

    .student-card .name {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .student-card .label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.45);
      font-weight: 500;
    }

    footer {
      margin-top: 70px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.25);
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.8rem; }
      .student-card { width: 150px; height: 170px; }
    }
  </style>
</head>
<body>

  <h1>📚 Homework Dashboard</h1>
  <p class="subtitle">Select a student to view their assignments</p>

  <div class="students-grid">

    <a class="student-card" href="students/yi/assignments.html">
      <span class="emoji">🌟</span>
      <span class="name">Yi</span>
      <span class="label">View Assignments</span>
    </a>

    <a class="student-card" href="students/tai/assignments.html">
      <span class="emoji">⭐</span>
      <span class="name">Tai</span>
      <span class="label">View Assignments</span>
    </a>

    <a class="student-card" href="students/ryan/assignments.html">
      <span class="emoji">🚀</span>
      <span class="name">Ryan</span>
      <span class="label">View Assignments</span>
    </a>

  </div>

  <footer>Updated daily via Google Classroom</footer>

</body>
</html>
