name: Fetch Homework Assignments

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:        # Also allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Yi ──────────────────────────────────────────────────────────────
      - name: Fetch Yi's assignments
        env:
          CREDENTIALS_JSON: ${{ secrets.YI_GOOGLE_CREDENTIALS }}
          TOKEN_JSON: ${{ secrets.YI_GOOGLE_TOKEN }}
        run: |
          echo "$CREDENTIALS_JSON" > students/yi/credentials.json
          echo "$TOKEN_JSON"       > students/yi/token.json
          (cd students/yi && python ../../fetch_assignments.py)
          rm -f students/yi/credentials.json students/yi/token.json

      # ── Commit all updated pages ─────────────────────────────────────────
      - name: Commit updated assignment pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add students/yi/assignments.html
          git diff --staged --quiet || git commit -m "Auto-update: assignments $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
